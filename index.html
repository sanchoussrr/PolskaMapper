<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolskaMapper — Интерактивная 3D карта Польши</title>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header__left">
            <a href="#" class="logo">
                <div class="logo__icon">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect width="28" height="28" rx="8" fill="#E63946"/>
                        <path d="M8 20V8h4c1.5 0 2.7.4 3.5 1.2.8.8 1.2 1.8 1.2 3.1 0 1.3-.4 2.3-1.2 3.1-.8.8-2 1.2-3.5 1.2H10.5V20H8z M10.5 14.2h1.3c.8 0 1.4-.2 1.8-.6.4-.4.6-.9.6-1.5s-.2-1.1-.6-1.5c-.4-.4-1-.6-1.8-.6H10.5v4.2z" fill="white"/>
                        <path d="M18 20V8h2v10h5v2H18z" fill="white" opacity="0.7"/>
                    </svg>
                </div>
                <span class="logo__text">PolskaMapper</span>
            </a>
            <nav class="nav">
                <a href="#" class="nav__link nav__link--active">Карта</a>
                <a href="#" class="nav__link">Города</a>
                <a href="#" class="nav__link">Недвижимость</a>
                <a href="#" class="nav__link">Аналитика</a>
            </nav>
        </div>
        <div class="header__right">
            <div class="search-box">
                <svg class="search-box__icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="text" class="search-box__input" placeholder="Поиск города, района, улицы..." id="searchInput">
            </div>
            <button class="btn btn--outline" id="langBtn">
                <span>RU</span>
            </button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar__header">
            <h2 class="sidebar__title">Крупные города Польши</h2>
            <p class="sidebar__subtitle">Выберите город для просмотра</p>
        </div>

        <div class="sidebar__filters">
            <button class="filter-btn filter-btn--active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="capital">Столица</button>
            <button class="filter-btn" data-filter="large">Крупные</button>
            <button class="filter-btn" data-filter="medium">Средние</button>
        </div>

        <div class="sidebar__sort">
            <span class="sidebar__sort-label">Сортировка:</span>
            <select class="sidebar__sort-select" id="sortSelect">
                <option value="population">По населению</option>
                <option value="name">По названию</option>
                <option value="area">По площади</option>
            </select>
        </div>

        <div class="city-list" id="cityList">
            <!-- Cities will be rendered here -->
        </div>

        <div class="sidebar__stats">
            <div class="stat-card">
                <div class="stat-card__value" id="totalCities">0</div>
                <div class="stat-card__label">Городов</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__value" id="totalPopulation">0</div>
                <div class="stat-card__label">Население</div>
            </div>
        </div>
    </aside>

    <!-- Map container -->
    <div id="map" class="map-container"></div>

    <!-- Map Controls -->
    <div class="map-controls">
        <button class="map-control-btn" id="zoomIn" title="Приблизить">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 4v10M4 9h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <button class="map-control-btn" id="zoomOut" title="Отдалить">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M4 9h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="map-control-divider"></div>
        <button class="map-control-btn" id="rotateBtn" title="3D Вид">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 2L2 6v6l7 4 7-4V6L9 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M2 6l7 4M9 10v8M9 10l7-4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
        </button>
        <button class="map-control-btn" id="resetBtn" title="Сброс вида">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M3 9a6 6 0 1 1 1.1 3.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M3 14V9h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <!-- Style Switcher -->
    <div class="style-switcher">
        <button class="style-btn style-btn--active" data-style="dark" title="Тёмная тема">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 1a7 7 0 1 0 0 14A5.5 5.5 0 0 1 8 1z" fill="currentColor"/>
            </svg>
        </button>
        <button class="style-btn" data-style="light" title="Светлая тема">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
                <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
        <button class="style-btn" data-style="satellite" title="Спутник">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/>
                <ellipse cx="8" cy="8" rx="3" ry="6.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M1.5 8h13" stroke="currentColor" stroke-width="1.5"/>
            </svg>
        </button>
    </div>

    <!-- City Popup -->
    <div class="city-popup" id="cityPopup">
        <button class="city-popup__close" id="closePopup">&times;</button>
        <div class="city-popup__header">
            <img class="city-popup__image" id="popupImage" src="" alt="">
            <div class="city-popup__overlay">
                <h3 class="city-popup__name" id="popupName"></h3>
                <span class="city-popup__voivodeship" id="popupVoivodeship"></span>
            </div>
        </div>
        <div class="city-popup__body">
            <div class="city-popup__stats">
                <div class="city-popup__stat">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM2 14c0-2.2 2.7-4 6-4s6 1.8 6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <div>
                        <div class="city-popup__stat-value" id="popupPopulation"></div>
                        <div class="city-popup__stat-label">Население</div>
                    </div>
                </div>
                <div class="city-popup__stat">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M2 6h12M6 2v12" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <div>
                        <div class="city-popup__stat-value" id="popupArea"></div>
                        <div class="city-popup__stat-label">Площадь</div>
                    </div>
                </div>
                <div class="city-popup__stat">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 14V4l4-2 4 2 4-2v10l-4 2-4-2-4 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <div>
                        <div class="city-popup__stat-value" id="popupDensity"></div>
                        <div class="city-popup__stat-label">Плотность</div>
                    </div>
                </div>
            </div>
            <div class="city-popup__description" id="popupDescription"></div>
            <div class="city-popup__landmarks">
                <h4>Достопримечательности</h4>
                <div class="city-popup__landmark-list" id="popupLandmarks"></div>
            </div>
            <button class="btn btn--primary btn--full" id="flyToCity">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1L2 8l6 7 6-7L8 1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                Перелететь к городу
            </button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-screen__content">
            <div class="loading-screen__logo">
                <svg width="60" height="60" viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="8" fill="#E63946"/>
                    <path d="M8 20V8h4c1.5 0 2.7.4 3.5 1.2.8.8 1.2 1.8 1.2 3.1 0 1.3-.4 2.3-1.2 3.1-.8.8-2 1.2-3.5 1.2H10.5V20H8z M10.5 14.2h1.3c.8 0 1.4-.2 1.8-.6.4-.4.6-.9.6-1.5s-.2-1.1-.6-1.5c-.4-.4-1-.6-1.8-.6H10.5v4.2z" fill="white"/>
                    <path d="M18 20V8h2v10h5v2H18z" fill="white" opacity="0.7"/>
                </svg>
            </div>
            <h2 class="loading-screen__title">PolskaMapper</h2>
            <p class="loading-screen__subtitle">Загрузка 3D карты Польши...</p>
            <div class="loading-bar">
                <div class="loading-bar__fill" id="loadingBar"></div>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <script src="cities-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
